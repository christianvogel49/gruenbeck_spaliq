name: "Grünbeck Spaliq Modbus Bridge"
description: "Reads data from a Grünbeck water softener via Modbus TCP and publishes it to MQTT with Home Assistant auto-discovery."
version: "1.0.0"
slug: "gruenbeck_spaliq"
url: "https://github.com/christianvogel49/gruenbeck_spaliq"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

options:
  modbus_host: "192.168.1.100"
  modbus_port: 502
  modbus_unit_id: 1
  poll_interval: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "gruenbeck"
  ha_discovery: true
  ha_discovery_prefix: "homeassistant"

schema:
  modbus_host: str
  modbus_port: int
  modbus_unit_id: int
  poll_interval: int
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  mqtt_topic_prefix: str
  ha_discovery: bool
  ha_discovery_prefix: str
